%YAML:1.0

#common parameters
imu_topic: "/imu0"
image_topic: "/cam0/image_raw"
output_path: "/tmp/vins_output/"

#camera calibration 
model_type: PINHOLE
camera_name: camera
image_width: 640
image_height: 480


distortion_parameters:
  k1: -0.483145774488054
  k2: 0.24127936059142024
  p1: 0.0008069356910599863
  p2: 0.000012957478417657807

projection_parameters:
  fx: 778.6293423219967
  fy: 777.7513516960524
  cx: 313.1217824578292
  cy: 228.689803693022



# Extrinsic parameter between IMU and Camera.
estimate_extrinsic: 0   # 0  Have an accurate extrinsic parameters. We will trust the following imu^R_cam, imu^T_cam, don't change it.
                        # 1  Have an initial guess about extrinsic parameters. We will optimize around your initial guess.
                        # 2  Don't know anything about extrinsic parameters. You don't need to give R,T. We will try to calibrate it. Do some rotation movement at beginning.                        



estimate_extrinsic: 0

extrinsicRotation: !!opencv-matrix
  rows: 3
  cols: 3
  dt: d
  data: [0.99911206, -0.00526973, -0.04180101, 0.00576544,  0.99991438,  0.01174704, 0.04173553, -0.01197761,  0.99905690]

extrinsicTranslation: !!opencv-matrix
  rows: 3
  cols: 1
  dt: d
  data: [-0.02037532, -0.00506978, 0.13759208]



#feature traker paprameters max_cnt: 250
max_cnt: 240            # max feature number in feature tracking
min_dist: 25            # min distance between two features 
freq: 12.5                # frequence (Hz) of publish tracking result. At least 10Hz for good estimation. If set 0, the frequence will be same as raw image 
F_threshold: 1.2        # ransac threshold (pixel)
show_track: 0           # publish tracking image as topic
equalize: 0            # if image is too dark or light, trun on equalize to find enough features
fisheye: 0              # if using fisheye, trun on it. A circle mask will be loaded to remove edge noisy points

#optimization parameters
max_solver_time: 0.06  # max solver itration time (ms), to guarantee real time
max_num_iterations: 6   # max solver itrations, to guarantee real time
keyframe_parallax: 8.0 # keyframe selection threshold (pixel)

#imu parameters       The more accurate parameters you provide, the better performance
acc_n: 0.08
acc_w: 0.008
gyr_n: 0.01
gyr_w: 0.001
g_norm: 9.80655

#loop closure parameters
loop_closure: 0                   # start loop closure
load_previous_pose_graph: 0        # load and reuse previous pose graph; load from 'pose_graph_save_path'
fast_relocalization: 0             # useful in real-time and large project
pose_graph_save_path: "/tmp/vins_output/pose_graph/" # save and load path

#unsynchronization parameters
estimate_td: 0                     # online estimate time offset between camera and imu
td: 0.002


#rolling shutter parameters
rolling_shutter: 0                  # 0: global shutter camera, 1: rolling shutter camera
rolling_shutter_tr: 0       

#visualization parameters
save_image: 0                   # save image in pose graph for visualization prupose; you can close this function by setting 0 
visualize_imu_forward: 0        # output imu forward propogation to achieve low latency and high frequence results
visualize_camera_size: 0.4      # size of camera marker in RVIZ
